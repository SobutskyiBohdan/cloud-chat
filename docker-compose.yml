services:
  # ─── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: cloud-chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cloud_chat
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cloud-chat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    container_name: cloud-chat-mailhog
    restart: unless-stopped
    ports:
      - "8025:8025"
    command: ["-auth-file=/etc/mailhog/auth"]
    volumes:
      - ./mailhog/auth:/etc/mailhog/auth:ro

  # ─── Backend (Express + Socket.io + Prisma) ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloud-chat-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cloud_chat
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: cloud-chat-access-secret-dev-32chars!!
      JWT_REFRESH_SECRET: cloud-chat-refresh-secret-dev-32chars!
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_FROM: noreply@cloud-chat.app
      FRONTEND_URL: http://localhost:3000
      PORT: 4000
      NODE_ENV: production
      CLOUDINARY_CLOUD_NAME: dl8w9mcol
      CLOUDINARY_API_KEY: "983959169767266"
      CLOUDINARY_API_SECRET: j_-h_mzsAa3QzWn4wpcNMF1Je8E
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend (Next.js) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cloud-chat-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
      JWT_ACCESS_SECRET: cloud-chat-access-secret-dev-32chars!!
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
