apiVersion: batch/v1
kind: CronJob
metadata:
  name: cleanup-expired-messages
  namespace: cloud-chat
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: cleanup
              image: postgres:15-alpine
              imagePullPolicy: IfNotPresent
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: cloud-chat-secrets
                      key: DATABASE_URL
              command:
                - sh
                - -c
                - |
                  psql "$DATABASE_URL" -c "
                    UPDATE \"Message\"
                    SET \"deletedAt\" = NOW()
                    WHERE \"expiresAt\" IS NOT NULL
                      AND \"expiresAt\" < NOW()
                      AND \"deletedAt\" IS NULL;
                  "
