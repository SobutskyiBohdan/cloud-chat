apiVersion: v1
kind: Secret
metadata:
  name: cloud-chat-secrets
  namespace: cloud-chat
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:postgres@postgres-service:5432/cloud_chat"
  REDIS_URL: "redis://redis-service:6379"
  JWT_ACCESS_SECRET: "CHANGE_THIS_TO_A_SECURE_RANDOM_STRING_32_CHARS"
  JWT_REFRESH_SECRET: "CHANGE_THIS_TO_ANOTHER_SECURE_RANDOM_STRING_32"
  CLOUDINARY_CLOUD_NAME: "your-cloud-name"
  CLOUDINARY_API_KEY: "your-api-key"
  CLOUDINARY_API_SECRET: "your-api-secret"
